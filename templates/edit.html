<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            margin-top: 80px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow p-4">

        <h3 class="text-center mb-3">✏️ Edit Student</h3>

        <form method="POST">

            <input type="text" name="name" value="{{ student[1] }}" class="form-control mb-2" required>

            <input type="text" name="roll" value="{{ student[2] }}" class="form-control mb-2" required>

            <input type="text" name="student_class" value="{{ student[3] }}" class="form-control mb-2" required>

            <input type="email" name="email" value="{{ student[4] }}" class="form-control mb-2" required>

            <input type="text" name="phone" value="{{ student[5] }}" class="form-control mb-2" required>

            <button class="btn btn-success w-100">Update</button>

        </form>

    </div>

</div>

</body>
</html>
