<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar {
            background: linear-gradient(90deg, #4b6cb7, #182848);
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
        }

        .table th {
            background: #4b6cb7;
            color: white;
        }

        .btn-add {
            background: #28a745;
            color: white;
        }

        .btn-add:hover {
            background: #218838;
        }

        .search-box {
            width: 300px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">📚 Student Management System</a>
  </div>
</nav>

<div class="container">

    <!-- ADD STUDENT FORM -->
    <div class="card p-4 shadow mb-4">
        <h4>Add Student</h4>
        <form method="POST" action="/add" class="row g-2">

            <div class="col-md-2">
                <input type="text" name="name" class="form-control" placeholder="Name" required>
            </div>

            <div class="col-md-2">
                <input type="text" name="roll" class="form-control" placeholder="Roll No" required>
            </div>

            <div class="col-md-2">
                <input type="text" name="student_class" class="form-control" placeholder="Class" required>
            </div>

            <div class="col-md-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="col-md-2">
                <input type="text" name="phone" class="form-control" placeholder="Phone" required>
            </div>

            <div class="col-md-1">
                <button class="btn btn-add w-100">Add</button>
            </div>

        </form>
    </div>

    <!-- SEARCH -->
    <form class="mb-3" action="/search" method="GET">
        <input type="text" name="query" class="form-control search-box" placeholder="Search student...">
    </form>

    <!-- TABLE -->
    <div class="card shadow p-3">
        <table class="table table-hover text-center">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll</th>
                <th>Class</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>

            {% for s in students %}
            <tr>
                <td>{{ s[0] }}</td>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>{{ s[3] }}</td>
                <td>{{ s[4] }}</td>
                <td>{{ s[5] }}</td>
                <td>
                    <a href="/edit/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
